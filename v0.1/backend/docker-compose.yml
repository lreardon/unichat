services:
  db:
    image: pgvector/pgvector:pg16
    container_name: unichat-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: unichat
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
