services:
  postgres:
    image: pgvector/pgvector:pg18
    environment:
      POSTGRES_USER: unichat
      POSTGRES_PASSWORD: unichat
      POSTGRES_DB: unichat
    volumes:
      - postgres-data:/var/lib/postgresql  # PG18 uses subdirectory layout
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U unichat"]
      interval: 5s
      timeout: 3s
      retries: 5

  embedder:
    image: ghcr.io/huggingface/text-embeddings-inference:cpu-latest
    platform: linux/amd64  # no arm64 build; runs via Rosetta on Apple Silicon
    command:
      - "--model-id"
      - "onnx-community/Qwen3-Embedding-0.6B-ONNX"
      - "--pooling"
      - "last-token"
      - "--max-concurrent-requests"
      - "8"
      - "--max-batch-tokens"
      - "512"
      - "--max-batch-requests"
      - "1"
      - "--max-client-batch-size"
      - "4"
      - "--tokenization-workers"
      - "2"
      - "--port"
      - "8080"
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 120s  # model download + Rosetta startup can be slow
    volumes:
      - ./data/embedder-cache:/data

volumes:
  postgres-data:
